<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate QR Code for digital restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    
    <nav class="navbar-expand-lg bg-body-tertiary">
        <div class="comtainer">
            <a href=""class="navbar-brand">Generate QR Code</a>
        </div>
    </nav>

    <!-- QR Code Form -->
    <div class="container mt-5" style="width:600px; border: 1px solid #D3D3D3; padding:30px; border-radius: 10px;">
        <form action="{% url 'generate_qr_code' %}" method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn btn-primary">Generate QR Code</button>
        </form>
    </div>

    <div class="container mt-5" style="width:600px; border: 1px solid #D3D3D3; padding:30px; border-radius: 10px;">

        <h2>{{ resturant_name }}</h2>
        <img src="{{ qr_url }}" alt="QR Code" class="img-fluid">
        <div>
            <a href="{{ qr_url }}" download="{{ file_name }}" class="btn btn-success">Download QR Code</a>
        </div>
        <h2>QR Code generated successfully!</h2>
    </div>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
